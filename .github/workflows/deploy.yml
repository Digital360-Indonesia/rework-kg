name: Deploy to VPS (dev.kustomgarment.com)

# Route B auto-deploy (Lord-Shipwright). On every push to main — including
# Sveltia CMS commits — build the Astro site in CI and rsync dist/ to the VPS.
# The deploy key is a DEDICATED key locked server-side by a forced `rrsync`
# command, so it can ONLY write into the dist dir (no shell, no root access),
# even though it connects as root. Manual `deploy.sh` (unrestricted key) stays
# as the fallback. PocketBase / pb_data / nginx are never touched by this.

on:
  push:
    branches: [main]
  workflow_dispatch:
  # KG PMS "Publish" — the PocketBase pb_hooks route (/pb/pms-publish) fires a
  # GitHub repository_dispatch with this event_type, which rebuilds + redeploys
  # so a PB admin can publish catalog edits without a git push.
  repository_dispatch:
    types: [pms-publish]

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Auto-optimize CMS uploads so unoptimized photos never bloat the live site.
      # Runs on the build copy only (originals in the repo are untouched).
      - name: Optimize uploaded images
        run: |
          sudo apt-get update -qq && sudo apt-get install -y imagemagick >/dev/null 2>&1
          find public/images/uploads -type f \( -iname '*.jpg' -o -iname '*.jpeg' \) -print0 \
            | xargs -0 -r mogrify -resize '1600x1600>' -strip -quality 70 || true

      # PMS_SOURCE=pb tells catalog-source.mjs to build from PocketBase (via the
      # adapter) instead of catalog.json. It auto-falls-back to catalog.json if
      # PB is unreachable or returns no products, so this is safe to leave on.
      - name: Build site (PMS source = PocketBase)
        env:
          PMS_SOURCE: pb
        run: npm run build

      - name: Set up restricted deploy key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Pre-pin the VPS host key instead of a live `ssh-keyscan` at runtime.
          # The old keyscan ran under `bash -e` and exits non-zero whenever it
          # returns no key inside its short timeout — which happens
          # intermittently from GitHub-hosted runners (transient outbound
          # rate-limiting / scan flakiness), killing this step and skipping the
          # deploy even though the VPS is up and reachable. The host IP is fixed,
          # so we commit its real public host keys here: zero network dependency,
          # and it's still a genuine StrictHostKeyChecking match (MITM-safe),
          # unlike StrictHostKeyChecking=no. Keyed to the alias "kg-vps" so it
          # matches regardless of what VPS_HOST contains (IP or hostname).
          cat >> ~/.ssh/known_hosts <<'EOF'
          kg-vps ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILq2IHZTXuRa+NBFQpO3gYl8gQy9Wt1WDyH3Rbpl5Xpx
          kg-vps ssh-rsa 
          EOF
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy (rsync dist -> VPS; rrsync confines target to the dist dir)
        run: |
          # HostKeyAlias=kg-vps makes ssh check the connection against the pinned
          # "kg-vps" known_hosts entry above (so the pin matches whether VPS_HOST
          # is the IP or a hostname). accept-new + ConnectTimeout are a
          # belt-and-suspenders fallback: the key is already pinned, but if it
          # ever rotates this records the new one instead of hard-failing, and a
          # 20s timeout avoids hanging on a transient blip. Auth is unchanged:
          # the restricted id_deploy key -> rrsync-confined dist dir.
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes -o HostKeyAlias=kg-vps -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20" \
            dist/ root@"${{ secrets.VPS_HOST }}":

      # Cloudflare sits in front of the VPS and caches static assets (e.g.
      # /images/uploads/*.webp) with a 10-year max-age + long edge TTL. When an
      # editor re-uploads an image under the SAME filename via Sveltia CMS, the
      # origin gets the new bytes but Cloudflare keeps serving the old cached
      # copy (same URL -> cf-cache-status: HIT) until purged. So after a
      # successful deploy we purge the cache to make re-uploads appear at once.
      #
      # We use "Purge Everything" (not a targeted /images/uploads/* prefix purge)
      # because prefix/tag purges are Cloudflare Enterprise-only; the site is
      # small + static, so purge_everything is the correct simple choice on
      # Free/Pro. This is the LAST step: the deploy has already succeeded, and a
      # purge failure is allowed to fail loudly (red X = go purge manually).
      - name: Purge Cloudflare cache
        run: |
          curl --fail-with-body -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo
