# Sveltia CMS config — Kustom Garment
# Admins edit at /admin. Saving commits to the repo → site rebuilds.
#
# GO-LIVE STATUS (see notes/cms-setup.md):
#   1. [DONE] Repo on GitHub; `repo` set below.
#   2. [DONE] GitHub OAuth via the sveltia-cms-auth Cloudflare Worker (`base_url` below).
#   3. [TODO] Auto-rebuild on push (currently a human runs `bash deploy.sh`).
# For LOCAL editing now (no GitHub needed): open the admin in a Chromium browser
# (Chrome/Edge) at http://localhost:4321/admin/index.html and click
# "Work with Local Repository" — Sveltia edits the repo files directly via the
# File System Access API. (Fallback for other browsers: `npx decap-server`.)

backend:
  name: github
  repo: Digital360-Indonesia/rework-kg
  branch: main
  base_url: https://sveltia-cms-auth.arayassuryanto.workers.dev   # OAuth relay (sveltia-cms-auth Worker)

local_backend: true        # enables local editing on localhost (online login uses base_url above)

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  # ---------------- GLOBAL (header, footer, contact, social) ----------------
  - name: settings
    label: "Pengaturan Situs"
    delete: false
    files:
      - name: site
        label: "Global — kontak, sosial, navigasi, footer"
        file: "src/data/site-config.json"
        fields:
          - { name: siteName, label: "Nama Situs", widget: string }
          - { name: tagline, label: "Tagline", widget: string, required: false }
          - name: contact
            label: "Kontak"
            widget: object
            fields:
              - { name: phoneFormatted, label: "Telepon (tampil)", widget: string }
              - { name: phone, label: "Telepon (angka)", widget: string }
              - { name: whatsappUrl, label: "WhatsApp URL", widget: string }
              - { name: email, label: "Email", widget: string }
              - { name: address, label: "Alamat", widget: text }
          - name: social
            label: "Sosial Media"
            widget: object
            fields:
              - { name: instagram, label: "Instagram URL", widget: string }
              - { name: tiktok, label: "TikTok URL", widget: string }
              - { name: facebook, label: "Facebook URL", widget: string, required: false }
              - { name: youtube, label: "YouTube URL", widget: string, required: false }
          - name: navigation
            label: "Navigasi Header (kategori)"
            widget: list
            fields:
              - { name: name, label: "Label", widget: string }
              - { name: path, label: "Link", widget: string }
          - name: footer
            label: "Footer"
            widget: object
            fields:
              - { name: tagline, label: "Tagline footer", widget: string }
              - name: infoLinks
                label: "Link Info"
                widget: list
                fields:
                  - { name: name, label: "Label", widget: string }
                  - { name: path, label: "Link", widget: string }
              - { name: legalLine, label: "Baris legal", widget: string }
              - { name: privacyLabel, label: "Label privacy", widget: string }
              - { name: privacyUrl, label: "Link privacy", widget: string }
              - { name: descriptor, label: "Deskriptor brand", widget: string }

  # ---------------- HOMEPAGE ----------------
  - name: homepage
    label: "Homepage"
    delete: false
    files:
      - name: home
        label: "Konten Homepage"
        file: "src/data/home.json"
        fields:
          - name: ticker
            label: "Ticker (perks berjalan)"
            widget: list
            field: { name: item, label: "Teks", widget: string }
          - name: hero
            label: "Section 1 — Hero (banner slider)"
            widget: object
            fields:
              - name: slides
                label: "Slide"
                widget: list
                fields:
                  - { name: image, label: "Gambar", widget: image }
                  - { name: href, label: "Link", widget: string }
                  - { name: alt, label: "Alt text", widget: string }
          - name: categoryCards
            label: "Section 2 — Kartu Kategori (5 kartu, hover ganti gambar)"
            widget: object
            fields:
              - { name: hoverImage, label: "Gambar hover (fallback, dipakai jika kartu belum punya sendiri)", widget: image, required: false }
              - name: items
                label: "Kartu (5)"
                widget: list
                fields:
                  - { name: label, label: "Label", widget: string }
                  - { name: href, label: "Link", widget: string }
                  - { name: image, label: "Gambar default", widget: image }
                  - { name: hoverImage, label: "Gambar saat hover (khusus kartu ini)", widget: image, required: false }
          - name: scenes
            label: "Section 4 — Scene Gallery"
            widget: object
            fields:
              - { name: headlinePrefix, label: "Awalan judul", widget: string }
              - name: flipWords
                label: "Kata berganti (orange)"
                widget: list
                field: { name: word, label: "Kata", widget: string }
              - name: items
                label: "Scene"
                widget: list
                fields:
                  - { name: img, label: "Gambar", widget: image }
                  - { name: title, label: "Judul", widget: string }
                  - { name: desc, label: "Deskripsi", widget: text }
                  - { name: ratio, label: "Rasio (mis. 4 / 5)", widget: string }
                  - { name: cta, label: "Teks CTA", widget: string }
                  - { name: waText, label: "Pesan WhatsApp", widget: text }
          - name: social
            label: "Section 5 — Social Wall (@kustomgarment)"
            widget: object
            fields:
              - { name: headlinePrefix, label: "Awalan judul", widget: string }
              - { name: handle, label: "Handle", widget: string }
              - { name: handleUrl, label: "Link handle", widget: string }
              - name: rows
                label: "Baris (3) — reel codes"
                widget: list
                field:
                  name: row
                  label: "Baris"
                  widget: list
                  fields:
                    - { name: code, label: "Kode reel IG", widget: string }
                    - { name: slow, label: "Diperlambat?", widget: boolean, required: false, default: false }
          - name: endCta
            label: "Section 6 — End CTA Banner"
            widget: object
            fields:
              - { name: title, label: "Judul", widget: string }
              - { name: ctaText, label: "Teks CTA", widget: string }
              - { name: bg, label: "Gambar (default)", widget: image }
              - { name: bgHover, label: "Gambar (hover)", widget: image }
              - { name: waText, label: "Pesan WhatsApp", widget: text }

  # ---------------- CATEGORIES (homepage section 3 showcases) ----------------
  - name: categories
    label: "Section 3 — Showcase Kategori (slider produk + gambar)"
    delete: false
    files:
      - name: categories
        label: "Business / Community / Campus / Personal"
        file: "src/data/categories.json"
        fields:
          - name: business
            label: "Business"
            widget: object
            fields:
              - { name: name, label: "Nama", widget: string }
              - { name: href, label: "Link", widget: string }
              - { name: rightImage, label: "Gambar lifestyle (kanan)", widget: image }
              - { name: rightEyebrow, label: "Eyebrow", widget: string }
              - { name: rightTitle, label: "Judul", widget: string }
              - { name: rightCta, label: "Teks CTA", widget: string }
              - name: products
                label: "Produk (carousel)"
                widget: list
                fields:
                  - { name: image, label: "Gambar produk", widget: image }
                  - { name: title, label: "Nama produk (unik, mis. 'Corporate Multi-Patch Varsity')", widget: string }
                  - { name: garment, label: "Kategori (Kemeja/Polo/Kaos/Jaket/Rompi/Wearpack) — tampil di subhead + tag filter", widget: string, required: false, default: "" }
                  - { name: client, label: "Klien — subhead jadi '<kategori> by <klien>' (kosongkan kalau tak ada)", widget: string, required: false, default: "" }
                  - { name: description, label: "Deskripsi singkat", widget: text }
          - name: community
            label: "Community"
            widget: object
            fields:
              - { name: name, label: "Nama", widget: string }
              - { name: href, label: "Link", widget: string }
              - { name: rightImage, label: "Gambar lifestyle (kanan)", widget: image }
              - { name: rightEyebrow, label: "Eyebrow", widget: string }
              - { name: rightTitle, label: "Judul", widget: string }
              - { name: rightCta, label: "Teks CTA", widget: string }
              - name: products
                label: "Produk (carousel)"
                widget: list
                fields:
                  - { name: image, label: "Gambar produk", widget: image }
                  - { name: title, label: "Nama produk (unik, mis. 'Corporate Multi-Patch Varsity')", widget: string }
                  - { name: garment, label: "Kategori (Kemeja/Polo/Kaos/Jaket/Rompi/Wearpack) — tampil di subhead + tag filter", widget: string, required: false, default: "" }
                  - { name: client, label: "Klien — subhead jadi '<kategori> by <klien>' (kosongkan kalau tak ada)", widget: string, required: false, default: "" }
                  - { name: description, label: "Deskripsi singkat", widget: text }
          - name: campus
            label: "Campus"
            widget: object
            fields:
              - { name: name, label: "Nama", widget: string }
              - { name: href, label: "Link", widget: string }
              - { name: rightImage, label: "Gambar lifestyle (kanan)", widget: image }
              - { name: rightEyebrow, label: "Eyebrow", widget: string }
              - { name: rightTitle, label: "Judul", widget: string }
              - { name: rightCta, label: "Teks CTA", widget: string }
              - name: products
                label: "Produk (carousel)"
                widget: list
                fields:
                  - { name: image, label: "Gambar produk", widget: image }
                  - { name: title, label: "Nama produk (unik, mis. 'Corporate Multi-Patch Varsity')", widget: string }
                  - { name: garment, label: "Kategori (Kemeja/Polo/Kaos/Jaket/Rompi/Wearpack) — tampil di subhead + tag filter", widget: string, required: false, default: "" }
                  - { name: client, label: "Klien — subhead jadi '<kategori> by <klien>' (kosongkan kalau tak ada)", widget: string, required: false, default: "" }
                  - { name: description, label: "Deskripsi singkat", widget: text }
          - name: personal
            label: "Personal"
            widget: object
            fields:
              - { name: name, label: "Nama", widget: string }
              - { name: href, label: "Link", widget: string }
              - { name: rightImage, label: "Gambar lifestyle (kanan)", widget: image }
              - { name: rightEyebrow, label: "Eyebrow", widget: string }
              - { name: rightTitle, label: "Judul", widget: string }
              - { name: rightCta, label: "Teks CTA", widget: string }
              - name: products
                label: "Produk (carousel)"
                widget: list
                fields:
                  - { name: image, label: "Gambar produk", widget: image }
                  - { name: title, label: "Nama produk (unik, mis. 'Corporate Multi-Patch Varsity')", widget: string }
                  - { name: garment, label: "Kategori (Kemeja/Polo/Kaos/Jaket/Rompi/Wearpack) — tampil di subhead + tag filter", widget: string, required: false, default: "" }
                  - { name: client, label: "Klien — subhead jadi '<kategori> by <klien>' (kosongkan kalau tak ada)", widget: string, required: false, default: "" }
                  - { name: description, label: "Deskripsi singkat", widget: text }

  # ---------------- STATIC PAGES (about / partnership / faq) ----------------
  - name: pages
    label: "Halaman (About / Partner / FAQ)"
    delete: false
    files:
      - name: about
        label: "About Us"
        file: "src/data/about.json"
        fields:
          - name: meta
            label: "SEO"
            widget: object
            fields:
              - { name: title, label: "Judul tab", widget: string }
              - { name: description, label: "Deskripsi SEO", widget: text }
          - name: stats
            label: "Statistik"
            widget: list
            fields:
              - { name: value, label: "Angka", widget: number }
              - { name: suffix, label: "Akhiran (mis. rb+, +)", widget: string, required: false }
              - { name: label, label: "Label", widget: string }
          - name: values
            label: "Keunggulan"
            widget: list
            fields:
              - { name: title, label: "Judul", widget: string }
              - { name: desc, label: "Deskripsi", widget: text }
          - { name: aboutImage, label: "Gambar", widget: image }
          - { name: clientLogos, label: "Logo klien (nama file)", widget: list }
      - name: partnership
        label: "Partner & Sponsorship"
        file: "src/data/partnership.json"
        fields:
          - name: meta
            label: "SEO"
            widget: object
            fields:
              - { name: title, label: "Judul tab", widget: string }
              - { name: description, label: "Deskripsi SEO", widget: text }
          - { name: waText, label: "Pesan WhatsApp", widget: text }
          - { name: logos, label: "Logo partner (nama file)", widget: list }
          - name: ways
            label: "Cara kolaborasi"
            widget: list
            fields:
              - { name: no, label: "Nomor", widget: string }
              - { name: title, label: "Judul", widget: string }
              - { name: desc, label: "Deskripsi", widget: text }
          - name: collabs
            label: "Kolaborasi terbaru"
            widget: list
            fields:
              - { name: img, label: "Gambar", widget: image }
              - { name: title, label: "Judul", widget: string }
              - { name: desc, label: "Deskripsi", widget: text }
      - name: faq
        label: "FAQ"
        file: "src/data/faq.json"
        fields:
          - name: meta
            label: "SEO"
            widget: object
            fields:
              - { name: title, label: "Judul tab", widget: string }
              - { name: description, label: "Deskripsi SEO", widget: text }
          - { name: waText, label: "Pesan WhatsApp", widget: text }
          - name: faqs
            label: "Pertanyaan"
            widget: list
            fields:
              - { name: q, label: "Pertanyaan", widget: string }
              - { name: a, label: "Jawaban", widget: text }

  # ---------------- HALAMAN KATEGORI (Business / Community / Campus / Personal) ----------------
  # Note: only hero + media (clients/lookbook). Product grid is driven by the product catalog
  # (src/data/products/catalog.json) and managed separately — NOT exposed here.
  - name: category_pages
    label: "Halaman Kategori (Business / Community / Campus / Personal)"
    delete: false
    files:
      - name: business
        label: "Business"
        file: "src/data/business.json"
        fields:
          - name: meta
            label: "SEO"
            widget: object
            fields:
              - { name: title, label: "Judul tab", widget: string }
              - { name: description, label: "Deskripsi SEO", widget: text }
          - name: hero
            label: "Hero"
            widget: object
            fields:
              - { name: banner, label: "Banner image", widget: image }
              - { name: bannerAlt, label: "Banner alt text", widget: string }
              - { name: title, label: "Judul", widget: string }
              - { name: sub, label: "Subjudul", widget: text }
          - { name: clients, label: "Logo klien (nama file di /images/clients/)", widget: list }
      - name: community
        label: "Community"
        file: "src/data/community.json"
        fields:
          - name: meta
            label: "SEO"
            widget: object
            fields:
              - { name: title, label: "Judul tab", widget: string }
              - { name: description, label: "Deskripsi SEO", widget: text }
          - name: hero
            label: "Hero"
            widget: object
            fields:
              - { name: titleLead, label: "Judul (bagian utama)", widget: string }
              - { name: titleAccent, label: "Judul (bagian aksen)", widget: string }
              - { name: sub, label: "Subjudul", widget: text }
              - { name: image, label: "Gambar hero", widget: image }
              - { name: imageAlt, label: "Alt text gambar", widget: string }
          - { name: clients, label: "Logo klien/komunitas (nama file di /images/clients/)", widget: list }
      - name: campus
        label: "Campus"
        file: "src/data/campus.json"
        fields:
          - name: meta
            label: "SEO"
            widget: object
            fields:
              - { name: title, label: "Judul tab", widget: string }
              - { name: description, label: "Deskripsi SEO", widget: text }
          - name: hero
            label: "Hero"
            widget: object
            fields:
              - { name: eyebrow, label: "Eyebrow (label kecil di atas judul)", widget: string }
              - { name: titleLead, label: "Judul (bagian utama)", widget: string }
              - { name: titleAccent, label: "Judul (bagian aksen)", widget: string }
              - { name: sub, label: "Subjudul", widget: text }
              - { name: image, label: "Gambar hero", widget: image }
              - { name: imageAlt, label: "Alt text gambar", widget: string }
          - { name: clients, label: "Logo klien/kampus (nama file di /images/clients/)", widget: list }
      - name: personal
        label: "Personal"
        file: "src/data/personal.json"
        fields:
          - name: meta
            label: "SEO"
            widget: object
            fields:
              - { name: title, label: "Judul tab", widget: string }
              - { name: description, label: "Deskripsi SEO", widget: text }
          - name: hero
            label: "Hero (lookbook style)"
            widget: object
            fields:
              - { name: image, label: "Gambar hero (full image)", widget: image }
              - { name: imageAlt, label: "Alt text gambar", widget: string }
              - { name: tagline, label: "Tagline kecil di atas", widget: string }
              - { name: line1, label: "Judul baris 1", widget: string }
              - { name: line2, label: "Judul baris 2", widget: string }
          - name: lookbook
            label: "Lookbook gallery (5 foto)"
            widget: list
            fields:
              - { name: img, label: "Gambar", widget: image }
              - { name: alt, label: "Alt text", widget: string }
              - { name: span, label: "Ukuran (tall / wide)", widget: select, options: ["tall", "wide"], default: "tall" }

  # ---------------- BLOG ----------------
  - name: blog
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: title, label: "Judul", widget: string }
      - { name: description, label: "Deskripsi", widget: text }
      - { name: pubDate, label: "Tanggal", widget: datetime }
      - { name: author, label: "Penulis", widget: string, default: "Kustom Garment" }
      - { name: image, label: "Cover", widget: image, required: false }
      - { name: category, label: "Kategori", widget: string }
      - { name: tags, label: "Tags", widget: list, default: [], required: false }
      - { name: featured, label: "Featured?", widget: boolean, default: false }
      - { name: body, label: "Isi", widget: markdown }

  # ---------------- BRIEF / CATATAN (per checklist item) ----------------
  # Notes shown inside /checklist. Edit here: rich text, tables, images.
  - name: briefs
    label: "Brief / Catatan (per item checklist)"
    folder: "public/briefs"
    extension: md
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { name: title, label: "Item", widget: string }
      - { name: body, label: "Brief (teks, tabel, gambar)", widget: markdown }
